<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trigonometrische Funktionen</title>
  <script>window.GG_APP_VERSION = '20260702.2';</script>
  <link rel="stylesheet" href="css/styles.css?v=20260702.2" />
  <script src="js/mathjax-config.js?v=20260702.2"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script src="js/vendor/geometry-angle-layout.js?v=20260702.2"></script>
</head>
<body>
  <div class="language-switcher" role="group" aria-label="Language selector">
    <button id="langDeButton" class="language-option is-active" type="button" aria-pressed="true" aria-label="Deutsch" title="Deutsch">
      <span class="language-flag" aria-hidden="true">🇩🇪</span>
      <span class="language-copy sr-only">
        <span class="language-name">Deutsch</span>
      </span>
    </button>
    <button id="langEnButton" class="language-option" type="button" aria-pressed="false" aria-label="English" title="English">
      <span class="language-flag" aria-hidden="true">🇬🇧</span>
      <span class="language-copy sr-only">
        <span class="language-name">English</span>
      </span>
    </button>
    <button id="langFrButton" class="language-option" type="button" aria-pressed="false" aria-label="Français" title="Français">
      <span class="language-flag" aria-hidden="true">🇫🇷</span>
      <span class="language-copy sr-only">
        <span class="language-name">Français</span>
      </span>
    </button>
  </div>

  <main>
    <h1 id="mainHeading">Trigonometrische Funktionen</h1>

    <section id="introScreen" class="screen intro-screen">
      <div class="panel">
        <div id="introAccessTitle" class="intro-field-title">Wähle den Zugang</div>
        <div id="introChoiceList" class="intro-choice-list" aria-label="Zugang auswählen">
          <button id="startTriangleButton" class="intro-choice" type="button">
            <span id="startTriangleTitle" class="intro-choice-title">am rechtwinkligen Dreieck</span>
            <span id="startTriangleDescription" class="intro-choice-description">Quiz über die Seitenverhältnisse bei Sinus, Kosinus und Tangens</span>
          </button>

          <button id="startUnitCircleButton" class="intro-choice" type="button">
            <span id="startUnitCircleTitle" class="intro-choice-title">am Einheitskreis</span>
            <span id="startUnitCircleDescription" class="intro-choice-description">Dieser Zugang wird als nächstes ergänzt.</span>
          </button>
        </div>

        <div class="intro-config">
          <div id="introDisplayTitle" class="intro-field-title">Darstellung</div>
          <fieldset class="config-fieldset">
            <legend id="rightAngleLegend">Rechter Winkel</legend>
            <label class="config-option" for="rightAngleArcDot">
              <input id="rightAngleArcDot" type="radio" name="rightAngleMarker" value="arcDot" checked />
              <span id="rightAngleArcDotLabel">Viertelkreis mit Punkt</span>
            </label>
            <label class="config-option" for="rightAngleSquare">
              <input id="rightAngleSquare" type="radio" name="rightAngleMarker" value="square" />
              <span id="rightAngleSquareLabel">Quadrat</span>
            </label>
          </fieldset>
        </div>
      </div>
    </section>

    <section id="quizScreen" class="screen quiz-screen hidden">
      <div class="quiz-top-row">
        <button id="backButton" class="secondary-button" type="button" title="Zur Startseite wechseln. Der Score bleibt bis zum Neuladen der Seite erhalten.">Zur Startseite</button>
        <button id="nextButton" type="button" title="Unbeantwortete Aufgabe überspringen und mit 0 Punkten werten.">Nächste Aufgabe</button>
      </div>

      <div class="quiz-layout">
        <div id="triangleStage" class="triangle-stage" aria-label="Dreiecksdarstellung">
          <div class="render-panel">
            <div id="renderTitle" class="render-title">Dreieck</div>
            <div id="triangleRenderer" class="render-surface"></div>
          </div>
        </div>

        <div class="panel task-panel">
          <div class="task-status-row">
            <div id="taskCounter" class="task-counter"></div>
            <div id="scoreCounter" class="score-counter" aria-live="polite"></div>
            <div id="timeCounter" class="time-counter" aria-live="off"></div>
          </div>

          <div id="roundStartPanel" class="round-start-panel">
            <button id="beginRoundButton" type="button">Start</button>
          </div>

          <form id="answerForm" class="answer-form">
            <div class="answer-row">
              <label id="taskQuestion" class="task-question mathjax-display" for="answerInput"></label>
              <input id="answerInput" type="text" autocomplete="off" spellcheck="false" aria-label="Antwort als Seitenverhältnis" placeholder="z. B. a/c" />
              <button id="checkButton" type="submit">Prüfen</button>
            </div>
          </form>

          <div id="answerHelpers" class="answer-helpers mathjax-display hidden" aria-label="Eingabehilfen"></div>

          <div id="feedback" class="feedback hidden" role="status" aria-live="polite"></div>
          <div id="solution" class="solution mathjax-display hidden"></div>
        </div>
      </div>
    </section>

    <section id="placeholderScreen" class="screen intro-screen hidden">
      <div class="panel">
        <p id="placeholderText">Der Zugang am Einheitskreis wird später ergänzt.</p>
        <button id="placeholderBackButton" class="secondary-button" type="button">Zurück</button>
      </div>
    </section>

    <section id="resultScreen" class="screen intro-screen hidden">
      <div class="panel result-panel">
        <div id="resultTitle" class="result-title">Runde abgeschlossen</div>
        <div id="resultScore" class="result-score" aria-live="polite"></div>
        <p id="resultDetail" class="result-detail"></p>
        <div id="resultTime" class="result-time"></div>
        <div class="result-actions">
          <button id="newRoundButton" type="button">Neues Quiz starten</button>
          <button id="resultHomeButton" class="secondary-button" type="button">Zur Startseite</button>
        </div>
      </div>
    </section>
  </main>

  <div class="version-badge" aria-label="Version">v2026.07.02.2</div>

  <script src="js/app.js?v=20260702.2"></script>
</body>
</html>
