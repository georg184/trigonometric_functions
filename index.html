<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trigonometrische Funktionen</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
  <script src="js/mathjax-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://www.geogebra.org/apps/deployggb.js"></script>
</head>
<body>
  <main>
    <h1>Trigonometrische Funktionen</h1>

    <section id="introScreen" class="screen intro-screen">
      <div class="panel">
        <div class="intro-field-title">Wähle den Zugang</div>
        <div class="intro-choice-list" aria-label="Zugang auswählen">
          <button id="startTriangleButton" class="intro-choice" type="button">
            <span class="intro-choice-title">am rechtwinkligen Dreieck</span>
            <span class="intro-choice-description">Quiz zu Sinus, Kosinus und Tangens als Seitenverhältnisse</span>
          </button>

          <button id="startUnitCircleButton" class="intro-choice" type="button">
            <span class="intro-choice-title">am Einheitskreis</span>
            <span class="intro-choice-description">Dieser Zugang wird als nächstes ergänzt.</span>
          </button>
        </div>

        <div class="intro-config">
          <div class="intro-field-title">Darstellung</div>
          <fieldset class="config-fieldset">
            <legend>Rechter Winkel</legend>
            <label class="config-option" for="rightAngleArcDot">
              <input id="rightAngleArcDot" type="radio" name="rightAngleMarker" value="arcDot" checked />
              <span>Viertelkreis mit Punkt</span>
            </label>
            <label class="config-option" for="rightAngleSquare">
              <input id="rightAngleSquare" type="radio" name="rightAngleMarker" value="square" />
              <span>Quadrat</span>
            </label>
          </fieldset>
        </div>
      </div>
    </section>

    <section id="quizScreen" class="screen quiz-screen hidden">
      <div class="quiz-top-row">
        <button id="backButton" class="secondary-button" type="button">Zurück</button>
        <button id="nextButton" type="button">Nächste Aufgabe</button>
      </div>

      <div class="quiz-layout">
        <div class="render-comparison" aria-label="Vergleich der Darstellungsarten">
          <div class="render-panel">
            <div class="render-title">1. Inline-SVG</div>
            <div id="svgRenderer" class="render-surface"></div>
          </div>

          <div class="render-panel">
            <div class="render-title">2. Inline-SVG + HTML/MathJax-Labels</div>
            <div id="svgHtmlRenderer" class="render-surface render-surface-layered"></div>
          </div>

          <div class="render-panel">
            <div class="render-title">3. JSXGraph</div>
            <div id="jsxGraphRenderer" class="render-surface jsxgraph-surface"></div>
          </div>

          <div class="render-panel">
            <div class="render-title">4. GeoGebra-Applet</div>
            <div id="geoGebraRenderer" class="render-surface geogebra-surface"></div>
          </div>

          <div class="render-panel render-panel-wide">
            <div class="render-title">5. D3.js + SVG</div>
            <div id="d3Renderer" class="render-surface"></div>
          </div>
        </div>

        <div class="panel task-panel">
          <div id="taskCounter" class="task-counter"></div>
          <div id="taskQuestion" class="task-question mathjax-display"></div>

          <form id="answerForm" class="answer-form">
            <label for="answerInput">Antwort als Seitenverhältnis</label>
            <div class="answer-row">
              <input id="answerInput" type="text" autocomplete="off" spellcheck="false" placeholder="z. B. a/c" />
              <button id="checkButton" type="submit">Prüfen</button>
            </div>
          </form>

          <div id="feedback" class="feedback hidden"></div>
          <div id="solution" class="solution mathjax-display hidden"></div>
        </div>
      </div>
    </section>

    <section id="placeholderScreen" class="screen intro-screen hidden">
      <div class="panel">
        <p>Der Zugang am Einheitskreis wird später ergänzt.</p>
        <button id="placeholderBackButton" class="secondary-button" type="button">Zurück</button>
      </div>
    </section>
  </main>

  <div class="version-badge" aria-label="Version">v2026.06.19.3</div>

  <script src="js/app.js"></script>
</body>
</html>
