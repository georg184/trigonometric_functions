name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python for answer-checker tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install answer-checker test dependency
        run: python -m pip install --disable-pip-version-check sympy==1.14.0

      - name: Verify JavaScript and runtime contracts
        env:
          PYTHON: python
        run: |
          node scripts/verify-javascript-syntax.js
          node scripts/verify-answer-checker.js
          node scripts/verify-task-flow.js
          node scripts/verify-localization.js
          node scripts/verify-angle-layout-consumer.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir _site
          cp index.html _site/
          cp README.md _site/
          cp .nojekyll _site/
          cp -R css js _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
